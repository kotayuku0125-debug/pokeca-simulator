<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokeca Simulator</title>

    <style>
        body{
            background:#1f1f1f;
            color:white;
            font-family:sans-serif;
            text-align:center;
            margin:0;
            padding:20px;
        }

        h1{
            margin-bottom:30px;
        }

        button{
            padding:10px 20px;
            margin:5px;
            font-size:16px;
            cursor:pointer;
        }

        #hand{
            margin-top:30px;
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:10px;
        }

        .card{
            width:150px;
            height:50px;
            border:2px solid white;
            border-radius:10px;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#333;
        }
    </style>
</head>
<body>

    <h1>Pokeca Simulator</h1>

    <h2>
        山札残り：
        <span id="deckCount">0</span>
    </h2>

    <button onclick="shuffleDeck()">
        シャッフル＋初手7枚
    </button>

    <button onclick="drawCard()">
        ドロー
    </button>

    <div id="hand"></div>

    <script>

        // 仮デッキ
        const originalDeck = [
            "クズモー",
            "クズモー",
            "クズモー",

            "メガドラミドロex",
            "メガドラミドロex",
            "メガドラミドロex",

            "ヨマワル",
            "ヨマワル",
            "ヨマワル",

            "サマヨール",
            "サマヨール",
            "サマヨール",

            "ヨノワール",
            "ヨノワール",

            "ムク",
            "ムク",
            "ムク",

            "なかよしポフィン",
            "なかよしポフィン",
            "なかよしポフィン",
            "なかよしポフィン",

            ...Array(40).fill("その他カード")
        ];

        let deck = [];
        let hand = [];

        function updateDisplay(){

            document.getElementById(
                "deckCount"
            ).textContent = deck.length;

            const handDiv =
                document.getElementById("hand");

            handDiv.innerHTML = "";

            hand.forEach(card=>{

                const div =
                    document.createElement("div");

                div.className = "card";

                div.textContent = card;

                handDiv.appendChild(div);
            });
        }

        function shuffle(array){

            for(
                let i=array.length-1;
                i>0;
                i--
            ){

                const j =
                    Math.floor(
                        Math.random()*(i+1)
                    );

                [array[i],array[j]]
                    =
                [array[j],array[i]];
            }
        }

        function shuffleDeck(){

            deck = [...originalDeck];
            hand = [];

            shuffle(deck);

            for(let i=0;i<7;i++){
                drawCard();
            }

            updateDisplay();
        }

        function drawCard(){

            if(deck.length===0)
                return;

            hand.push(
                deck.pop()
            );

            updateDisplay();
        }

        shuffleDeck();

    </script>

</body>
</html>
